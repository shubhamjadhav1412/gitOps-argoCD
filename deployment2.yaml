apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp-2
spec:
  replicas: 2
  selector:
    matchLabels:
      app: myapp-2
  template:
    metadata:
      labels:
        app: myapp-2
    spec:
      containers:
      - name: myapp-2
        image: httpd:latest
        ports:
        - containerPort: 80
